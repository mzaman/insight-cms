openapi: 3.0.0
info:
  title: 'Insight CMS : REST API (v1)'
  description: |
    Welcome to the **Insight CMS REST API v1** documentation! This API enables you to interact with the various components of the Insight CMS platform, such as user management, authentication, permissions, role management, and content management (posts, etc.).

    **Authentication Overview:**
    - Users must first authenticate by calling the `/api/v1/auth/login` endpoint with their `email` and `password` to obtain a **JWT (Bearer) Token**.
    - This token will be used in the `Authorization` header as `Bearer <JWT_TOKEN>` for subsequent requests to access protected endpoints.
    - The token is time-limited and will expire, but users can refresh the token by using the `/api/v1/auth/refresh` endpoint.
    - Logging out is done via the `/api/v1/auth/logout` endpoint, which invalidates the token.

    **Authentication Flow:**
    1. **Login**: Call `/api/v1/auth/login` with valid credentials.
    2. **Receive Token**: On successful login, the system responds with a JWT token that can be used to authenticate further requests.
    3. **Use Token**: For all protected routes, pass the token in the `Authorization` header as `Bearer <JWT_TOKEN>`.
    4. **Refresh Token**: If the token expires, use `/api/v1/auth/refresh` to obtain a new token.
    5. **Logout**: Call `/api/v1/auth/logout` to invalidate the token.

    **Rate Limiting and Pagination:**
    - If applicable, the API may implement rate limiting using headers such as `X-Rate-Limit` to indicate how many requests can be made within a specific time period.
    - Pagination may be used for endpoints that return large datasets (e.g., listing users or posts). This will include `page` and `limit` query parameters to control the number of records returned.

  version: 1.0.0
servers:
  - url: http://web.test
  - url: https://newsapi.org

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    noauthAuth:
      type: http
      scheme: noauth
  responses:
    Unauthorized:
      description: Unauthorized - Authentication failed or token expired
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Unauthorized. Invalid email/password or expired token."
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Resource not found."
    Forbidden:
      description: Access forbidden due to insufficient permissions
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Forbidden. You do not have permission to access this resource."
paths:
  /api/v1/api-key:
    post:
      tags:
        - default
      summary: Create NewsAPI Key
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                service_name:
                  type: string
                  description: >-
                    The name of the service for which the API key is being
                    created. Example: 'News API2'.
                  example: News API2
                api_key:
                  type: string
                  description: >-
                    A unique API key used for accessing the News API. This key
                    should be kept secure.
                  example: <API_KEY>
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          description: Indicates that the response should be in JSON format.
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/auth/register:
    post:
      tags:
        - default
      summary: Register
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: >-
                    The full name of the user being registered. Example:
                    'TestUser'.
                  example: TestUser
                password:
                  type: string
                  description: 'The password for the user. Example: ''password''.'
                  example: password
                email:
                  type: string
                  description: 'The email address of the user. Example: ''user3@mail.com''.'
                  example: user3@mail.com
                role_id:
                  type: integer
                  description: 'The ID of the role to be assigned to the user. Example: ''4''.'
                  example: '4'
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          description: Indicates that the response should be in JSON format.
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/auth/login:
    post:
      tags:
        - default
      summary: Login
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: >-
                    The email address of the user attempting to log in. Example:
                    'admin@mail.com'.
                  example: admin@mail.com
                password:
                  type: string
                  description: >-
                    The password associated with the provided email. Example:
                    'password'.
                  example: password
      security:
        - bearerAuth: []
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          description: Indicates that the response should be in JSON format.
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/auth/refresh:
    post:
      tags:
        - default
      summary: Refresh
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: The email address of the user requesting the token refresh.
                  example: admin@mail.com
                password:
                  type: string
                  description: The password of the user requesting the token refresh.
                  example: password
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          description: Indicates that the response should be in JSON format.
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/auth/logout:
    post:
      tags:
        - default
      summary: Logout
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: >-
                    The email address of the user logging out. Example:
                    'admin@mail.com'.
                  example: admin@mail.com
                password:
                  type: string
                  description: >-
                    The password associated with the provided email. Example:
                    'password'.
                  example: password
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          description: Indicates that the response should be in JSON format.
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/permissions:
    post:
      tags:
        - default
      summary: Add Permission
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'The name of the permission. Example: ''Share''.'
                  example: Share
                slug:
                  type: string
                  description: >-
                    The slug for the permission, used for URL routing. Example:
                    'share'.
                  example: share
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          description: Indicates that the response should be in JSON format.
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    get:
      tags:
        - default
      summary: List Permissions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/roles:
    post:
      tags:
        - default
      summary: Add Role
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'The name of the role being created. Example: ''Editor''.'
                  example: Editor
                slug:
                  type: string
                  description: >-
                    The slug for the role, used for URL routing. Example:
                    'editor'.
                  example: editor
      security:
        - bearerAuth: []
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          description: Indicates that the response should be in JSON format.
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/roles/1:
    get:
      tags:
        - default
      summary: Show Role Without Permissions
      security:
        - noauthAuth: []
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          description: Indicates that the response should be in JSON format.
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/posts:
    post:
      tags:
        - default
      summary: Delete Post
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: >-
                    The title of the post to be deleted. Example: 'my blog
                    title'.
                  example: my blog title
                content:
                  type: string
                  description: >-
                    The content of the post to be deleted. Example: 'Content
                    goes here'.
                  example: Content goes here
                external_id:
                  type: string
                  description: >-
                    An external ID or reference URL associated with the post to
                    be deleted. Example: 'https://domain.com/page1'.
                  example: https://domain.com/page1
                user_id:
                  type: integer
                  description: >-
                    The user ID associated with the post to be deleted. Example:
                    '1'.
                  example: '1'
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          description: Indicates that the response should be in JSON format.
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    get:
      tags:
        - default
      summary: List Posts
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/users:
    get:
      tags:
        - default
      summary: List Users
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/sync-news:
    post:
      tags:
        - default
      summary: Sync from NewsAPI
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties: {}
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          description: Indicates that the response should be in JSON format.
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/cli-sync-news:
    post:
      tags:
        - default
      summary: NewSync via CLI
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties: {}
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          description: Indicates that the response should be in JSON format.
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v2/top-headlines:
    get:
      tags:
        - default
      summary: News API Direct Fetch
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          description: 'API key used to authenticate the request. Example: ''<API_KEY>''.'
          example: 4164b37f2e1a47a1a583003a70c420b3
        - name: country
          in: query
          schema:
            type: string
          description: 'Country code for the news source. Example: ''us''.'
          example: us
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}