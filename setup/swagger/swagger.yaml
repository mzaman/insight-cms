openapi: 3.0.0
info:
  title: 'Insight CMS : REST API'
  version: 1.0.0
servers:
  - url: http://web.test
  - url: https://newsapi.org
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
security:
  - bearerAuth: []
paths:
  /api/v1/auth/register:
    post:
      tags:
        - default
      summary: Register
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: TestUser
                password:
                  type: string
                  example: password
                email:
                  type: string
                  example: user3@mail.com
                role_id:
                  type: integer
                  example: '4'
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/auth/login:
    post:
      tags:
        - default
      summary: Login
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: admin@mail.com
                password:
                  type: string
                  example: password
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/auth/refresh:
    post:
      tags:
        - default
      summary: Refresh
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: admin@mail.com
                password:
                  type: string
                  example: password
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/auth/logout:
    post:
      tags:
        - default
      summary: Logout
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: admin@mail.com
                password:
                  type: string
                  example: password
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/permissions:
    post:
      tags:
        - default
      summary: Add Permission
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Share
                slug:
                  type: string
                  example: share
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    get:
      tags:
        - default
      summary: List Permissions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/roles:
    post:
      tags:
        - default
      summary: Add Role
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Editor
                slug:
                  type: string
                  example: editor
      security:
        - bearerAuth: []
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/roles/1:
    get:
      tags:
        - default
      summary: Show Role With Permissions
      security:
        - bearerAuth: []
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/post:
    post:
      tags:
        - default
      summary: Create NewsAPI Key
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: post 1
                content:
                  type: string
                  example: rerererer  ere
                user_id:
                  type: integer
                  example: '1'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/posts:
    get:
      tags:
        - default
      summary: List Posts
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/posts/21:
    delete:
      tags:
        - default
      summary: Delete Post
      security:
        - bearerAuth: []
      parameters:
        - name: Accept
          in: header
          schema:
            type: string
          example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/users:
    get:
      tags:
        - default
      summary: List Users
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/sync-news:
    post:
      tags:
        - default
      summary: News Sync
      requestBody:
        content: {}
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v1/cli-sync-news:
    post:
      tags:
        - default
      summary: News Sync via CLI
      requestBody:
        content: {}
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /v2/top-headlines:
    get:
      tags:
        - default
      summary: News API Direct Fetch
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: 4164b37f2e1a47a1a583003a70c420b3
        - name: country
          in: query
          schema:
            type: string
          example: us
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}